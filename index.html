<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimuAnchi 材料系統</title>
<style>
  :root {
    --primary: #2563a8;
    --primary-dark: #1d4d85;
    --bg: #f4f6f9;
    --card-bg: #ffffff;
    --border: #dbe2ea;
    --text: #000000;
    --text-muted: #6b7684;
    --danger: #c0524a;
    --success: #4a7c59;
    --warn: #b8894a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .ta-is-hidden { display: none !important; }

  #authLoading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: var(--text-muted);
    font-size: 13px;
  }
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  .ta-login-box {
    background: var(--card-bg);
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    width: 320px;
  }
  .ta-login-box h1 { font-size: 18px; margin: 0 0 24px; text-align: center; color: var(--primary-dark); }
  .ta-login-box input {
    width: 100%; padding: 10px 12px; margin-bottom: 12px;
    border: 1px solid var(--border); border-radius: 6px; font-size: 14px;
  }
  .ta-login-box button {
    width: 100%; padding: 10px; border: none; border-radius: 6px;
    background: var(--primary); color: #fff; font-size: 14px; cursor: pointer;
  }
  .ta-login-box button:hover { background: var(--primary-dark); }
  #loginError { color: var(--danger); font-size: 13px; margin-top: 8px; min-height: 16px; }

  #app { padding: 20px; }

  .ta-topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .ta-topbar h1 { font-size: 20px; color: var(--primary-dark); margin: 0; }
  .ta-topbar-right { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); }

  .ta-btn {
    padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: #fff; cursor: pointer; font-size: 12px; color: var(--text);
  }
  .ta-btn:hover { border-color: var(--primary); color: var(--primary-dark); }
  .ta-btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .ta-btn-primary:hover { background: #fff; }
  .ta-btn-danger { color: var(--danger); }
  .ta-btn-danger-solid { background: var(--danger); color: #fff; border-color: var(--danger); }
  .ta-btn-danger-solid:hover { opacity: 0.9; }
  .ta-btn-sm { padding: 6px 8px; font-size: 10px; }

  .ta-summary-bar {
    display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .ta-summary-card {
    background: var(--card-bg); border-radius: 10px; padding: 14px 18px;
    border: 1px solid var(--border); flex: 1; min-width: 140px;
  }
  .ta-stat-label { font-size: 12px; color: var(--text-muted); }
  .ta-stat-value { font-size: 20px; font-weight: 600; color: var(--primary-dark); margin-top: 4px; }

  .ta-category-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .ta-category-tab {
    padding: 6px 14px; border-radius: 16px; border: 1px solid var(--border); background: #fff;
    font-size: 12px; cursor: pointer; color: var(--text-muted);
  }
  .ta-category-tab:hover { border-color: var(--primary); color: var(--primary-dark); }
  .ta-category-tab.ta-is-active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .ta-category-tab--add { border-style: dashed; }

  .ta-options-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .ta-options-tab {
    padding: 6px 12px; border-radius: 16px; border: 1px solid var(--border); background: #fff;
    font-size: 12.5px; cursor: pointer; color: var(--text-muted);
  }
  .ta-options-tab:hover { border-color: var(--primary); color: var(--primary-dark); }
  .ta-options-tab.ta-is-active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .ta-options-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .ta-options-row-order { display: flex; gap: 4px; }
  .ta-options-row-input {
    flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
  }
  .ta-currency-code { min-width: 50px; font-weight: 600; font-size: 13px; }

  .ta-filter-bar {
    display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center;
  }
  .ta-filter-bar select, .ta-filter-bar input[type=text] {
    padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px;
  }
  .ta-filter-bar label { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }

  .ta-unit-row { display: flex; gap: 6px; }
  .ta-unit-row input, .ta-unit-row select { flex: 1; min-width: 0; }
  .ta-unit-row .ta-combo-add-btn { position: static; padding: 8px 10px; white-space: nowrap; }

  .ta-radio-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .ta-radio-option { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text); cursor: pointer; }
  .ta-radio-row input[type=radio] { width: auto; }

  .ta-table-scroll { overflow-x: auto; }
  table { width: 100%; min-width: 900px; border-collapse: collapse; background: var(--card-bg); border-radius: 10px; overflow: hidden; }
  thead th {
    text-align: left; font-size: 12px; color: #fff; font-weight: 500; white-space: nowrap;
    padding: 10px 12px; border-bottom: 1px solid var(--border); background: #2563a8;
  }
  tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 12px; white-space: nowrap; }
  tbody tr:hover { background: #eff3f7; cursor: pointer; }
  tbody tr.ta-row--archived { opacity: 0.5; }
  .ta-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; background: #e8edf3; color: var(--text-muted); }
  .ta-col-right { text-align: right; }
  .ta-col-center { text-align: center; }

  .ta-pagination-info { text-align: right; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .ta-pagination { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; justify-content: flex-end; }
  .ta-pagination-numbers { display: flex; gap: 4px; flex-wrap: wrap; }
  .ta-pagination-arrow, .ta-pagination-num {
    width: 25px; height: 20px; padding: 0; border: none;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text); background: #eef1f5; cursor: pointer;
  }
  .ta-pagination-arrow { border-radius: 50%; }
  .ta-pagination-num { border-radius: 6px; }
  .ta-pagination-arrow:hover, .ta-pagination-num:hover { background: var(--border); }
  .ta-pagination-arrow:disabled { opacity: 0.4; cursor: not-allowed; }
  .ta-pagination-arrow:disabled:hover { background: #eef1f5; }
  .ta-pagination-num.ta-is-active { background: var(--primary-dark); color: #fff; font-weight: 600; }
  .ta-pagination-num.ta-is-active:hover { background: var(--primary-dark); }
  .ta-pagination-ellipsis { padding: 0 4px; color: var(--text-muted); }
  .ta-pagination-jump { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-muted); }
  .ta-pagination-jump input {
    width: 36px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 10px;
  }

  .ta-modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    align-items: center; justify-content: center; z-index: 100; padding: 20px;
  }
  .ta-modal-overlay.ta-is-open { display: flex; }
  .ta-modal {
    position: relative;
    background: #fff; border-radius: 12px; padding: 24px; width: 100%; max-width: 560px;
    max-height: 88vh; overflow-y: auto;
  }
  .ta-modal h2 { margin: 0 0 16px; font-size: 17px; color: var(--primary-dark); }
  .ta-modal--wide { max-width: 720px; }
  .ta-modal-text { font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 14px; }

  .ta-form-row { margin-bottom: 12px; }
  .ta-form-row label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .ta-form-row input, .ta-form-row select, .ta-form-row textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
  }
  .ta-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }
  .ta-form-grid .ta-form-row--full { grid-column: 1 / -1; }
  .ta-modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .ta-modal-close { position: absolute; top: 16px; right: 20px; cursor: pointer; font-size: 18px; color: var(--text-muted); }

  .ta-combo-wrap { position: relative; }
  .ta-combo-add-btn {
    position: absolute; right: 4px; top: 26px; font-size: 11px; padding: 3px 8px;
    background: var(--primary); color: #fff; border: none; border-radius: 4px; cursor: pointer;
  }

  .ta-dup-hint {
    padding: 10px 12px; border-radius: 8px; font-size: 12.5px; margin-bottom: 14px; display: none;
  }
  .ta-dup-hint.ta-is-visible { display: block; }
  .ta-dup-hint--found { background: #fdf3e8; color: var(--warn); border: 1px solid #f0dcc0; }
  .ta-dup-hint--clear { background: #eef6ef; color: var(--success); border: 1px solid #d6e9d9; }

  .ta-calc-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .ta-timeline { margin-top: 16px; border-left: 2px solid var(--border); padding-left: 16px; }
  .ta-timeline-heading { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .ta-timeline-item { margin-bottom: 16px; position: relative; }
  .ta-timeline-item::before {
    content: ''; position: absolute; left: -21px; top: 4px; width: 8px; height: 8px;
    border-radius: 50%; background: var(--primary);
  }
  .ta-timeline-time { font-size: 12px; color: var(--text-muted); }
  .ta-timeline-type { font-size: 12px; font-weight: 600; margin: 2px 0; }
  .ta-timeline-type--purchase { color: var(--success); }
  .ta-timeline-type--adjust { color: var(--warn); }
  .ta-timeline-type--edit { color: var(--text-muted); }
  .ta-timeline-detail { font-size: 12px; color: var(--text); line-height: 1.6; }

  .ta-detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; padding-right: 32px; flex-wrap: wrap; gap: 8px; }
  .ta-detail-title { font-size: 16px; font-weight: 600; color: var(--primary-dark); }
  .ta-detail-category { margin-bottom: 8px; }
  .ta-detail-stats { display: flex; gap: 20px; margin: 12px 0; }
  .ta-detail-stats .ta-stat-label { font-size: 12px; }
  .ta-detail-stats .ta-stat-value { font-size: 16px; margin-top: 0; }
  .ta-section-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .ta-empty-hint { text-align: center; color: var(--text-muted); padding: 40px 0; font-size: 13px; }

  .ta-hamburger-btn { font-size: 16px; padding: 8px 12px; line-height: 1; }

  .ta-drawer-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 150;
  }
  .ta-drawer-overlay.ta-is-open { display: block; }

  .ta-drawer {
    position: fixed; top: 0; right: 0; height: 100vh; width: 280px; max-width: 85vw;
    background: #fff; z-index: 151; box-shadow: -4px 0 20px rgba(0,0,0,0.12);
    transform: translateX(100%); transition: transform 0.25s ease;
    display: flex; flex-direction: column; padding: 20px;
  }
  .ta-drawer.ta-is-open { transform: translateX(0); }

  .ta-drawer-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; font-size: 13px; color: var(--text-muted);
  }
  .ta-drawer-nav { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .ta-drawer-link {
    padding: 10px 12px; border-radius: 6px; font-size: 14px; text-decoration: none; color: var(--text);
  }
  .ta-drawer-link:hover { background: var(--bg); }
  .ta-drawer-link.ta-is-active { background: var(--primary); color: #fff; font-weight: 600; }

  .ta-drawer-divider { border-top: 1px solid var(--border); margin: 12px 0; }

  .ta-drawer-item {
    display: block; width: 100%; text-align: left; padding: 10px 12px; border-radius: 6px;
    border: none; background: none; font-size: 14px; color: var(--text); cursor: pointer;
  }
  .ta-drawer-item:hover { background: var(--bg); }
  .ta-drawer-item--danger { color: var(--danger); }
  .ta-drawer-close { cursor: pointer; font-size: 18px; color: var(--text-muted); }

  .ta-import-summary {
    padding: 12px 14px; border-radius: 8px; background: #eef6ef; border: 1px solid #d6e9d9;
    font-size: 13px; color: var(--text); margin: 14px 0; line-height: 1.7;
  }
  .ta-import-errors {
    padding: 12px 14px; border-radius: 8px; background: #fdf0ef; border: 1px solid #f0d0cc;
    font-size: 12.5px; color: var(--danger); margin: 14px 0; max-height: 220px; overflow-y: auto;
  }
  .ta-import-errors ul { margin: 6px 0 0; padding-left: 18px; }
  .ta-import-progress { font-size: 13px; color: var(--text-muted); margin: 14px 0; }

  @media (max-width:640px){
    .ta-stat-value{ 
      font-size: 16px;
    }
    .ta-drawer{
      width: 55%;
    }
    .ta-drawer-header{
      font-size: 12px;
    }
    .ta-category-tab{
      font-size: 10px;
    }
    .ta-filter-bar select, .ta-filter-bar input[type=text]{
      font-size: 12px;
    }
    .ta-filter-bar label{
      font-size: 10px;
    }
    .ta-detail-title{
      font-size: 14px;
    }
    .ta-tag{
      font-size: 10px;
    }
    .ta-detail-stats .ta-stat-label{
      font-size: 10px;
    }
    .ta-detail-stats .ta-stat-value{
      font-size: 14px;
    }
    .ta-timeline-heading {
      font-size: 12px;
    }
    .ta-timeline-detail{
      font-size: 12px;
    }
  }
</style>
</head>
<body>

<div id="authLoading">載入中...</div>

<div id="loginScreen" class="ta-is-hidden">
  <div class="ta-login-box">
    <h1>TimuAnchi 材料系統</h1>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="密碼">
    <button id="loginBtn">登入</button>
    <div id="loginError"></div>
  </div>
</div>

<div id="app" class="ta-is-hidden">
  <header class="ta-topbar">
    <h1>材料清單</h1>
    <div class="ta-topbar-right">
      <button class="ta-btn ta-btn-primary" id="openPurchaseBtn">＋ 新增進貨 / 材料</button>
      <button class="ta-btn ta-hamburger-btn" id="openMenuBtn" aria-label="選單">☰</button>
    </div>
  </header>

  <div class="ta-summary-bar">
    <div class="ta-summary-card">
      <div class="ta-stat-label">材料款數(不含下架)</div>
      <div class="ta-stat-value" id="statCount">-</div>
    </div>
    <div class="ta-summary-card">
      <div class="ta-stat-label">庫存總數量(依單位分列)</div>
      <div class="ta-stat-value" id="statQty">-</div>
    </div>
    <div class="ta-summary-card">
      <div class="ta-stat-label">庫存總值(NT$)</div>
      <div class="ta-stat-value" id="statValue">-</div>
    </div>
  </div>

  <div class="ta-category-tabs" id="categoryTabs"></div>

  <div class="ta-filter-bar">
    <input type="text" id="searchInput" placeholder="搜尋材料名稱 / 顏色">
    <select id="filterBrand"><option value="">全部品牌</option></select>
    <select id="filterMaterial"><option value="">全部材質</option></select>
    <select id="filterBeadType"><option value="">全部類型/款式</option></select>
    <label><input type="checkbox" id="showArchived"> 顯示已下架</label>
  </div>

  <div class="ta-pagination-info" id="paginationInfo"></div>
  <div class="ta-pagination" id="pagination"></div>

  <div class="ta-table-scroll">
  <table>
    <thead>
      <tr>
        <th>分類</th><th>品牌</th><th>材質</th><th>類型/款式</th><th>尺寸</th><th>色系</th><th>顏色</th>
        <th class="ta-col-right">庫存</th><th class="ta-col-right">進價</th><th class="ta-col-center">狀態</th>
      </tr>
    </thead>
    <tbody id="materialsTbody"></tbody>
  </table>
  </div>
  <div class="ta-empty-hint ta-is-hidden" id="emptyHint">目前沒有材料資料,點右上角「新增進貨/材料」開始建立</div>
</div>

<!-- 新增進貨 / 材料 Modal -->
<div class="ta-modal-overlay" id="purchaseModal">
  <div class="ta-modal ta-modal--wide">
    <span class="ta-modal-close" data-close="purchaseModal">✕</span>
    <h2>新增進貨 / 材料</h2>

    <div class="ta-form-grid">
      <div class="ta-form-row ta-combo-wrap">
        <label>分類</label>
        <select id="pCategory"></select>
        <button type="button" class="ta-combo-add-btn" data-target="pCategory" data-optkey="categories">+新增</button>
      </div>
      <div class="ta-form-row ta-combo-wrap">
        <label>品牌</label>
        <select id="pBrand"></select>
        <button type="button" class="ta-combo-add-btn" data-target="pBrand" data-optkey="brands">+新增</button>
      </div>
      <div class="ta-form-row ta-combo-wrap">
        <label>材質</label>
        <select id="pMaterial"></select>
        <button type="button" class="ta-combo-add-btn" data-target="pMaterial" data-optkey="materials">+新增</button>
      </div>
      <div class="ta-form-row ta-combo-wrap">
        <label>類型/款式</label>
        <select id="pBeadType"></select>
        <button type="button" class="ta-combo-add-btn" data-target="pBeadType" data-optkey="beadTypes">+新增</button>
      </div>
      <div class="ta-form-row">
        <label>尺寸(選填，統一半形小寫，如：2mm*6mm)</label>
        <input type="text" id="pSize">
      </div>
      <div class="ta-form-row">
        <label>色系名稱(選填)</label>
        <input type="text" id="pColorSeries">
      </div>
      <div class="ta-form-row">
        <label>顏色(選填)</label>
        <input type="text" id="pColorCode">
      </div>
    </div>

    <div class="ta-dup-hint" id="dupHint"></div>

    <hr class="ta-section-divider">

    <div class="ta-form-grid">
      <div class="ta-form-row">
        <label>進貨日期</label>
        <input type="date" id="pPurchaseDate">
      </div>
      <div class="ta-form-row">
        <label>進貨國家/平台</label>
        <input type="text" id="pPlatform">
      </div>
      <div class="ta-form-row">
        <label>供應商名稱</label>
        <input type="text" id="pSeller">
      </div>
      <div class="ta-form-row">
        <label>幣別</label>
        <select id="pCurrency">
          <option value="TWD">TWD(台幣)</option>
        </select>
      </div>
      <div class="ta-form-row">
        <label id="pAmountLabel">原始金額(該次總額)</label>
        <input type="number" step="0.01" id="pAmount">
      </div>
      <div class="ta-form-row ta-form-row--full">
        <label>金額輸入方式</label>
        <div class="ta-radio-row">
          <label class="ta-radio-option"><input type="radio" name="pAmountMode" value="total" id="pAmountModeTotal" checked> 上面填的是「這次總金額」(供應商論包/整批報價)</label>
          <label class="ta-radio-option"><input type="radio" name="pAmountMode" value="unit" id="pAmountModeUnit"> 上面填的是「單價」(供應商論顆/論個報價)</label>
        </div>
      </div>
      <div class="ta-form-row" id="pPackageSpecRow">
        <label>進貨包裝規格(選填，參考用，不影響庫存計算)</label>
        <div class="ta-unit-row">
          <input type="number" step="0.01" id="pPackageSpecValue" placeholder="數字,如 5">
          <select id="pPackageSpecUnit"></select>
          <button type="button" class="ta-combo-add-btn" data-target="pPackageSpecUnit" data-optkey="packageUnits">+新增</button>
        </div>
      </div>
      <div class="ta-form-row">
        <label>本次進貨數量(必填，用於庫存與單價計算)</label>
        <div class="ta-unit-row">
          <input type="number" id="pQuantity" placeholder="數字">
          <select id="pQuantityUnit"></select>
          <button type="button" class="ta-combo-add-btn" data-target="pQuantityUnit" data-optkey="stockUnits">+新增</button>
        </div>
      </div>
      <div class="ta-form-row ta-form-row--full">
        <div class="ta-calc-hint" id="calcHint"></div>
      </div>
    </div>

    <div class="ta-modal-actions">

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import {
  getFirestore, collection, doc, getDoc, getDocs, addDoc, updateDoc, setDoc, deleteDoc,
  query, where, orderBy, serverTimestamp, onSnapshot, Timestamp, writeBatch
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgeqH5KrIVj6xVlA7gPXa8Mg4sQO73QL4",
  authDomain: "timuanchi-erpbom.firebaseapp.com",
  projectId: "timuanchi-erpbom",
  storageBucket: "timuanchi-erpbom.firebasestorage.app",
  messagingSenderId: "640849188003",
  appId: "1:640849188003:web:9a0039a6053f206c8f5b16"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ---------- 全域狀態 ----------
let materials = [];       // 目前所有材料(含下架)
let options = { brands: [], materials: [], beadTypes: [], categories: [], packageUnits: [], stockUnits: [] };
let exchangeRates = { CNY: 5, JPY: 3 };
let currentDetailId = null;
let dupMatchedMaterial = null; // 新增進貨時比對到的既有材料
let categoryFilter = ''; // 目前選中的分類頁籤,空字串代表全部
let currentPage = 1;
const PAGE_SIZE = 200;

const DEFAULT_CATEGORIES = ['日本製玻璃珠', '捷克製玻璃珠', '中國製玻璃珠', '不鏽鋼', '925銀', '銅胚', '天然石水晶', '貝殼', '耳夾'];
const DEFAULT_PACKAGE_UNITS = ['g', '兩', '包', '條', '公斤', '個'];
const DEFAULT_STOCK_UNITS = ['顆', '克', '副', '對', '條', '公斤', '米'];

// ---------- 登入 ----------
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  signInWithEmailAndPassword(auth, email, password).catch(err => {
    errEl.textContent = '登入失敗:帳號或密碼錯誤';
  });
}

document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, user => {
  document.getElementById('authLoading').classList.add('ta-is-hidden');
  if (user) {
    document.getElementById('loginScreen').classList.add('ta-is-hidden');
    document.getElementById('app').classList.remove('ta-is-hidden');
    document.getElementById('userEmail').textContent = user.email;
    initData();
  } else {
    document.getElementById('loginScreen').classList.remove('ta-is-hidden');
    document.getElementById('app').classList.add('ta-is-hidden');
  }
});

// ---------- 初始化資料 ----------
function initData() {
  onSnapshot(collection(db, 'materials'), snap => {
    materials = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderFilters();
    renderTable();
    renderSummary();
  });

  const optRef = doc(db, 'settings', 'options');
  onSnapshot(optRef, snap => {
    const base = { brands: [], materials: [], beadTypes: [], categories: [], packageUnits: [], stockUnits: [] };
    if (snap.exists()) {
      options = { ...base, ...snap.data() };
      // 舊資料補齊新欄位的預設值(僅在該欄位尚不存在時寫入)
      const missing = {};
      if (!snap.data().categories) missing.categories = DEFAULT_CATEGORIES;
      if (!snap.data().packageUnits) missing.packageUnits = DEFAULT_PACKAGE_UNITS;
      if (!snap.data().stockUnits) missing.stockUnits = DEFAULT_STOCK_UNITS;
      if (Object.keys(missing).length) {
        options = { ...options, ...missing };
        setDoc(optRef, missing, { merge: true });
      }
    } else {
      options = { ...base, categories: DEFAULT_CATEGORIES, packageUnits: DEFAULT_PACKAGE_UNITS, stockUnits: DEFAULT_STOCK_UNITS };
      setDoc(optRef, options);
    }
    fillComboOptions('pBrand', options.brands);
    fillComboOptions('pMaterial', options.materials);
    fillComboOptions('pBeadType', options.beadTypes);
    fillComboOptions('pCategory', options.categories);
    fillComboOptions('pPackageSpecUnit', options.packageUnits);
    fillComboOptions('pQuantityUnit', options.stockUnits);
    fillComboOptions('eCategory', options.categories);
    fillComboOptions('eBrand', options.brands);
    fillComboOptions('eMaterial', options.materials);
    fillComboOptions('eBeadType', options.beadTypes);
    renderCategoryTabs();
  });

  const rateRef = doc(db, 'settings', 'exchangeRates');
  onSnapshot(rateRef, snap => {
    if (snap.exists()) {
      exchangeRates = snap.data();
    } else {
      setDoc(rateRef, exchangeRates);
    }
    fillCurrencySelect();
    renderExchangeRateList();
  });
}

function fillCurrencySelect() {
  const sel = document.getElementById('pCurrency');
  const current = sel.value;
  const codes = Object.keys(exchangeRates).sort();
  sel.innerHTML = '<option value="TWD">TWD(台幣)</option>' + codes.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  if (current && (current === 'TWD' || codes.includes(current))) sel.value = current;
}

function fillComboOptions(selectId, list) {
  const sel = document.getElementById(selectId);
  const current = sel.value;
  sel.innerHTML = '<option value="">(未選擇)</option>' + list.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
  if (list.includes(current)) sel.value = current;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- 篩選 / 列表渲染 ----------
function resetPageAndRenderTable() { currentPage = 1; renderTable(); }
document.getElementById('searchInput').addEventListener('input', resetPageAndRenderTable);
document.getElementById('filterBrand').addEventListener('change', resetPageAndRenderTable);
document.getElementById('filterMaterial').addEventListener('change', resetPageAndRenderTable);
document.getElementById('filterBeadType').addEventListener('change', resetPageAndRenderTable);
document.getElementById('showArchived').addEventListener('change', resetPageAndRenderTable);

function renderFilters() {
  const scoped = categoryFilter ? materials.filter(m => m.category === categoryFilter) : materials;
  const uniq = key => [...new Set(scoped.map(m => m[key]).filter(Boolean))].sort();
  fillFilterSelect('filterBrand', uniq('brand'));
  fillFilterSelect('filterMaterial', uniq('material'));
  fillFilterSelect('filterBeadType', uniq('beadType'));
}

function renderCategoryTabs() {
  const wrap = document.getElementById('categoryTabs');
  const cats = options.categories || [];

  const allTab = document.createElement('div');
  allTab.className = 'ta-category-tab' + (categoryFilter === '' ? ' ta-is-active' : '');
  allTab.textContent = '全部';
  allTab.addEventListener('click', () => { categoryFilter = ''; switchCategory(); });

  const tabs = cats.map(c => {
    const tab = document.createElement('div');
    tab.className = 'ta-category-tab' + (categoryFilter === c ? ' ta-is-active' : '');
    tab.textContent = c;
    tab.addEventListener('click', () => { categoryFilter = c; switchCategory(); });
    return tab;
  });

  const addTab = document.createElement('div');
  addTab.className = 'ta-category-tab ta-category-tab--add';
  addTab.textContent = '＋ 新增分類';
  addTab.addEventListener('click', async () => {
    const val = await showInputModal({ title: '新增分類', label: '輸入新的分類名稱' });
    if (!val) return;
    if (!options.categories.includes(val)) {
      options.categories = [...(options.categories || []), val];
      await setDoc(doc(db, 'settings', 'options'), { categories: options.categories }, { merge: true });
    }
  });

  wrap.innerHTML = '';
  wrap.appendChild(allTab);
  tabs.forEach(t => wrap.appendChild(t));
  wrap.appendChild(addTab);
}

function switchCategory() {
  currentPage = 1;
  renderCategoryTabs();
  renderFilters();
  renderTable();
  renderSummary();
}

// ---------- 選項管理(分類/品牌/材質/類型/單位 共用的編輯+調順序介面) ----------
const OPTION_GROUPS = [
  { key: 'categories', label: '分類', cascadeField: 'category' },
  { key: 'brands', label: '品牌', cascadeField: 'brand' },
  { key: 'materials', label: '材質', cascadeField: 'material' },
  { key: 'beadTypes', label: '類型/款式', cascadeField: 'beadType' },
  { key: 'packageUnits', label: '包裝單位', cascadeField: null },
  { key: 'stockUnits', label: '庫存單位', cascadeField: 'unit' },
];
let optionsModalKey = 'categories';

document.getElementById('openOptionsBtn').addEventListener('click', () => {
  closeDrawer();
  renderOptionsTabs();
  renderOptionsList();
  openModal('optionsModal');
});

function renderOptionsTabs() {
  const wrap = document.getElementById('optionsTabs');
  wrap.innerHTML = '';
  OPTION_GROUPS.forEach(g => {
    const tab = document.createElement('div');
    tab.className = 'ta-options-tab' + (optionsModalKey === g.key ? ' ta-is-active' : '');
    tab.textContent = g.label;
    tab.addEventListener('click', () => { optionsModalKey = g.key; renderOptionsTabs(); renderOptionsList(); });
    wrap.appendChild(tab);
  });
}

function renderOptionsList() {
  const list = options[optionsModalKey] || [];
  const wrap = document.getElementById('optionsList');
  wrap.innerHTML = '';
  if (!list.length) {
    wrap.innerHTML = '<div class="ta-empty-hint">尚無選項</div>';
    return;
  }
  list.forEach((val, idx) => {
    const row = document.createElement('div');
    row.className = 'ta-options-row';
    row.innerHTML = `
      <div class="ta-options-row-order">
        <button type="button" class="ta-btn ta-btn-sm" ${idx === 0 ? 'disabled' : ''}>↑</button>
        <button type="button" class="ta-btn ta-btn-sm" ${idx === list.length - 1 ? 'disabled' : ''}>↓</button>
      </div>
      <input type="text" class="ta-options-row-input" value="${escapeHtml(val)}">
      <button type="button" class="ta-btn ta-btn-sm ta-btn-primary">儲存</button>
    `;
    const [upBtn, downBtn] = row.querySelectorAll('.ta-options-row-order button');
    const input = row.querySelector('.ta-options-row-input');
    const saveBtn = row.querySelector('.ta-btn-primary');
    upBtn.addEventListener('click', () => moveOption(idx, -1));
    downBtn.addEventListener('click', () => moveOption(idx, 1));
    saveBtn.addEventListener('click', () => renameOption(idx, input.value.trim()));
    wrap.appendChild(row);
  });
}

async function moveOption(idx, delta) {
  const list = [...(options[optionsModalKey] || [])];
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= list.length) return;
  [list[idx], list[newIdx]] = [list[newIdx], list[idx]];
  options[optionsModalKey] = list;
  await setDoc(doc(db, 'settings', 'options'), { [optionsModalKey]: list }, { merge: true });
  renderOptionsList();
}

async function renameOption(idx, newVal) {
  const list = [...(options[optionsModalKey] || [])];
  const oldVal = list[idx];
  if (!newVal) { alert('名稱不能空白'); return; }
  if (newVal === oldVal) return;
  if (list.includes(newVal)) { alert('這個名稱已經存在了'); return; }

  list[idx] = newVal;
  options[optionsModalKey] = list;
  await setDoc(doc(db, 'settings', 'options'), { [optionsModalKey]: list }, { merge: true });

  const group = OPTION_GROUPS.find(g => g.key === optionsModalKey);
  if (group.cascadeField) {
    const affected = materials.filter(m => m[group.cascadeField] === oldVal);
    for (const m of affected) {
      await updateDoc(doc(db, 'materials', m.id), { [group.cascadeField]: newVal, updatedAt: serverTimestamp() });
      await addDoc(collection(db, 'materials', m.id, 'history'), {
        type: 'edit', field: group.label, oldValue: oldVal, newValue: newVal, timestamp: serverTimestamp(),
      });
    }
  }
  renderOptionsList();
}

function fillFilterSelect(id, list) {
  const sel = document.getElementById(id);
  const current = sel.value;
  const firstLabel = sel.options[0].textContent;
  sel.innerHTML = `<option value="">${firstLabel}</option>` + list.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
  if (list.includes(current)) sel.value = current;
}

function displayName(m) {
  return [m.brand, m.material, m.beadType, m.colorSeries, m.size].filter(Boolean).join(' ') +
    (m.colorCode ? '－' + m.colorCode : '');
}

function renderTable() {
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  const fBrand = document.getElementById('filterBrand').value;
  const fMaterial = document.getElementById('filterMaterial').value;
  const fBeadType = document.getElementById('filterBeadType').value;
  const showArchived = document.getElementById('showArchived').checked;

  let list = materials.filter(m => {
    if (!showArchived && m.archived) return false;
    if (categoryFilter && m.category !== categoryFilter) return false;
    if (fBrand && m.brand !== fBrand) return false;
    if (fMaterial && m.material !== fMaterial) return false;
    if (fBeadType && m.beadType !== fBeadType) return false;
    if (kw) {
      const name = displayName(m).toLowerCase();
      if (!name.includes(kw) && !(m.colorCode || '').toLowerCase().includes(kw)) return false;
    }
    return true;
  });

  list.sort((a, b) => {
    const ta = a.createdAt?.toMillis ? a.createdAt.toMillis() : Infinity;
    const tb = b.createdAt?.toMillis ? b.createdAt.toMillis() : Infinity;
    return tb - ta;
  });

  const totalPages = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  const pagedList = list.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  const tbody = document.getElementById('materialsTbody');
  tbody.innerHTML = '';
  document.getElementById('emptyHint').classList.toggle('ta-is-hidden', list.length > 0);

  const infoEl = document.getElementById('paginationInfo');
  if (list.length === 0) {
    infoEl.textContent = '';
  } else {
    const startIdx = (currentPage - 1) * PAGE_SIZE + 1;
    const endIdx = Math.min(currentPage * PAGE_SIZE, list.length);
    infoEl.textContent = `顯示第 ${startIdx.toLocaleString()}–${endIdx.toLocaleString()} 筆，共 ${list.length.toLocaleString()} 筆`;
  }
  renderPagination(totalPages);

  for (const m of pagedList) {
    const stock = m.currentStock || 0;
    const cost = m.currentUnitCost || 0;
    const unit = m.unit || '';
    const tr = document.createElement('tr');
    if (m.archived) tr.classList.add('ta-row--archived');
    tr.innerHTML = `
      <td>${escapeHtml(m.category)}</td>
      <td>${escapeHtml(m.brand)}</td>
      <td>${escapeHtml(m.material)}</td>
      <td>${escapeHtml(m.beadType)}</td>
      <td>${escapeHtml(m.size)}</td>
      <td>${escapeHtml(m.colorSeries)}</td>
      <td>${escapeHtml(m.colorCode)}</td>
      <td class="ta-col-right">${stock.toLocaleString()} ${escapeHtml(unit)}</td>
      <td class="ta-col-right">${cost ? 'NT$' + cost.toFixed(2) + ' / ' + escapeHtml(unit) : '-'}</td>
      <td class="ta-col-center">${m.archived ? '<span class="ta-tag">已下架</span>' : ''}</td>
    `;
    tr.addEventListener('click', () => openDetail(m.id));
    tbody.appendChild(tr);
  }
}

function renderPagination(totalPages) {
  const wrap = document.getElementById('pagination');

  const pageNumbers = [];
  for (let p = 1; p <= totalPages; p++) {
    if (p === 1 || p === totalPages || (p >= currentPage - 2 && p <= currentPage + 2)) {
      pageNumbers.push(p);
    } else if (pageNumbers[pageNumbers.length - 1] !== '...') {
      pageNumbers.push('...');
    }
  }

  wrap.innerHTML = `
    <button class="ta-pagination-arrow" id="prevPageBtn" aria-label="上一頁" ${currentPage === 1 ? 'disabled' : ''}>◀</button>
    <span class="ta-pagination-numbers">
      ${pageNumbers.map(p => p === '...'
        ? `<span class="ta-pagination-ellipsis">...</span>`
        : `<button class="ta-pagination-num${p === currentPage ? ' ta-is-active' : ''}" data-page="${p}">${p}</button>`
      ).join('')}
    </span>
    <button class="ta-pagination-arrow" id="nextPageBtn" aria-label="下一頁" ${currentPage === totalPages ? 'disabled' : ''}>▶</button>
    <span class="ta-pagination-jump">
      <input type="number" id="jumpPageInput" min="1" max="${totalPages}" value="${currentPage}"> / ${totalPages}
      <button class="ta-btn ta-btn-sm" id="jumpPageBtn">跳轉</button>
    </span>
  `;

  document.getElementById('prevPageBtn').addEventListener('click', () => {
    if (currentPage > 1) { currentPage--; renderTable(); }
  });
  document.getElementById('nextPageBtn').addEventListener('click', () => {
    if (currentPage < totalPages) { currentPage++; renderTable(); }
  });
  wrap.querySelectorAll('.ta-pagination-num').forEach(btn => {
    btn.addEventListener('click', () => { currentPage = parseInt(btn.dataset.page); renderTable(); });
  });
  const jumpInput = document.getElementById('jumpPageInput');
  const doJump = () => {
    const val = parseInt(jumpInput.value);
    if (!isNaN(val) && val >= 1 && val <= totalPages) { currentPage = val; renderTable(); }
  };
  document.getElementById('jumpPageBtn').addEventListener('click', doJump);
  jumpInput.addEventListener('keydown', e => { if (e.key === 'Enter') doJump(); });
}

function renderSummary() {
  const scoped = categoryFilter ? materials.filter(m => m.category === categoryFilter) : materials;
  const active = scoped.filter(m => !m.archived);
  const totalValue = active.reduce((s, m) => s + (m.currentStock || 0) * (m.currentUnitCost || 0), 0);
  const qtyByUnit = {};
  active.forEach(m => {
    const u = m.unit || '(未設單位)';
    qtyByUnit[u] = (qtyByUnit[u] || 0) + (m.currentStock || 0);
  });
  const qtyText = Object.entries(qtyByUnit).map(([u, q]) => `${q.toLocaleString()} ${u}`).join('、') || '-';
  document.getElementById('statCount').textContent = active.length;
  document.getElementById('statQty').textContent = qtyText;
  document.getElementById('statValue').textContent = totalValue.toLocaleString(undefined, { maximumFractionDigits: 0 });
}

// 通用輸入視窗,取代 window.prompt,回傳 Promise<string|null>
function showInputModal({ title = '請輸入', label = '', defaultValue = '' } = {}) {
  return new Promise(resolve => {
    document.getElementById('inputModalTitle').textContent = title;
    document.getElementById('inputModalLabel').textContent = label;
    const field = document.getElementById('inputModalField');
    field.value = defaultValue;
    openModal('inputModal');
    setTimeout(() => field.focus(), 50);

    const closeEls = document.querySelectorAll('#inputModal [data-close]');
    const confirmBtn = document.getElementById('inputModalConfirmBtn');

    const cleanup = () => {
      confirmBtn.removeEventListener('click', onConfirm);
      field.removeEventListener('keydown', onKeydown);
      closeEls.forEach(el => el.removeEventListener('click', onCancel));
    };
    const onConfirm = () => {
      const val = field.value.trim();
      cleanup();
      closeModal('inputModal');
      resolve(val || null);
    };
    const onCancel = () => { cleanup(); resolve(null); };
    const onKeydown = e => { if (e.key === 'Enter') onConfirm(); };

    confirmBtn.addEventListener('click', onConfirm);
    field.addEventListener('keydown', onKeydown);
    closeEls.forEach(el => el.addEventListener('click', onCancel));
  });
}

// 通用確認視窗,取代 window.confirm,回傳 Promise<boolean>
function showConfirmModal({ title = '請確認', text = '' } = {}) {
  return new Promise(resolve => {
    document.getElementById('confirmModalTitle').textContent = title;
    document.getElementById('confirmModalText').textContent = text;
    openModal('confirmModal');

    const closeEls = document.querySelectorAll('#confirmModal [data-close]');
    const okBtn = document.getElementById('confirmModalOkBtn');

    const cleanup = () => {
      okBtn.removeEventListener('click', onOk);
      closeEls.forEach(el => el.removeEventListener('click', onCancel));
    };
    const onOk = () => { cleanup(); closeModal('confirmModal'); resolve(true); };
    const onCancel = () => { cleanup(); resolve(false); };

    okBtn.addEventListener('click', onOk);
    closeEls.forEach(el => el.addEventListener('click', onCancel));
  });
}

function checkDuplicate() {
  const key = {
    category: document.getElementById('pCategory').value.trim(),
    brand: document.getElementById('pBrand').value.trim(),
    material: document.getElementById('pMaterial').value.trim(),
    beadType: document.getElementById('pBeadType').value.trim(),
    size: document.getElementById('pSize').value.trim(),
    colorSeries: document.getElementById('pColorSeries').value.trim(),
    colorCode: document.getElementById('pColorCode').value.trim(),
  };
  const hasAny = Object.values(key).some(v => v);
  const hint = document.getElementById('dupHint');
  if (!hasAny) {
    dupMatchedMaterial = null;
    hint.className = 'ta-dup-hint';
    hint.textContent = '';
    setQuantityUnitLock(false);
    return;
  }
  const match = materials.find(m => !m.archived &&
    (m.category || '') === key.category &&
    (m.brand || '') === key.brand &&
    (m.material || '') === key.material &&
    (m.beadType || '') === key.beadType &&
    (m.size || '') === key.size &&
    (m.colorSeries || '') === key.colorSeries &&
    (m.colorCode || '') === key.colorCode
  );
  dupMatchedMaterial = match || null;
  if (match) {
    hint.className = 'ta-dup-hint ta-is-visible ta-dup-hint--found';
    hint.textContent = `⚠ 偵測到已有相同材料(目前庫存 ${match.currentStock || 0} ${match.unit || ''})。送出後將新增一筆進貨紀錄到這筆材料,庫存會累加,單位鎖定為「${match.unit || '(未設定)'}」。`;
    document.getElementById('pQuantityUnit').value = match.unit || '';
    setQuantityUnitLock(true);
  } else {
    hint.className = 'ta-dup-hint ta-is-visible ta-dup-hint--clear';
    hint.textContent = '沒有找到完全相符的既有材料,送出後將建立一筆全新材料。';
    setQuantityUnitLock(false);
  }
  updateCalcHint();
}

// 即時試算換算金額 / 單價
['pCurrency','pAmount','pQuantity','pQuantityUnit'].forEach(id => {

  document.getElementById(id).addEventListener('change', updateCalcHint);
});

function convertToTwd(amount, currency) {
  if (currency === 'TWD') return amount;
  return amount * (exchangeRates[currency] || 1);
}

function updateCalcHint() {
  const amount = parseFloat(document.getElementById('pAmount').value);
  const currency = document.getElementById('pCurrency').value;
  const qty = parseFloat(document.getElementById('pQuantity').value);
  const unit = document.getElementById('pQuantityUnit').value || '(單位)';
  const mode = document.querySelector('input[name="pAmountMode"]:checked').value;
  const hintEl = document.getElementById('calcHint');
  if (isNaN(amount) || isNaN(qty) || qty <= 0) { hintEl.textContent = ''; return; }

  if (mode === 'unit') {
    const twdUnitCost = convertToTwd(amount, currency);
    const twdTotal = twdUnitCost * qty;
    hintEl.textContent = `單價換算台幣:NT$ ${twdUnitCost.toFixed(4)} / ${unit}　→　這次總金額:NT$ ${twdTotal.toFixed(2)}`;
  } else {
    const twd = convertToTwd(amount, currency);
    const unitCost = twd / qty;
    hintEl.textContent = `換算台幣金額：NT$ ${twd.toFixed(2)}　→　換算單價：NT$ ${unitCost.toFixed(4)} / ${unit}`;
  }
}

document.getElementById('submitPurchaseBtn').addEventListener('click', submitPurchase);

async function submitPurchase() {
  const category = document.getElementById('pCategory').value.trim();
  const brand = document.getElementById('pBrand').value.trim();
  const material = document.getElementById('pMaterial').value.trim();
  const beadType = document.getElementById('pBeadType').value.trim();
  const size = document.getElementById('pSize').value.trim();
  const colorSeries = document.getElementById('pColorSeries').value.trim();
  const colorCode = document.getElementById('pColorCode').value.trim();

  const platform = document.getElementById('pPlatform').value.trim();
  const seller = document.getElementById('pSeller').value.trim();
  const currency = document.getElementById('pCurrency').value;
  const amount = parseFloat(document.getElementById('pAmount').value);
  const amountMode = document.querySelector('input[name="pAmountMode"]:checked').value;
  const packageSpecValueRaw = document.getElementById('pPackageSpecValue').value.trim();
  const packageSpecUnit = document.getElementById('pPackageSpecUnit').value.trim();
  const quantity = parseFloat(document.getElementById('pQuantity').value);
  const quantityUnitInput = document.getElementById('pQuantityUnit').value.trim();
  const purchaseDateStr = document.getElementById('pPurchaseDate').value;

  if (!quantity || quantity <= 0) { alert('請輸入本次進貨數量'); return; }
  if (!quantityUnitInput) { alert('請選擇本次進貨的單位'); return; }
  if (isNaN(amount) || amount < 0) { alert('請輸入正確的金額'); return; }
  if (!purchaseDateStr) { alert('請選擇進貨日期'); return; }

  // 進貨日期用使用者選的日期,時分秒沿用當下時間,確保同一天補登多筆時仍能依輸入順序排列
  const now = new Date();
  const [pdY, pdM, pdD] = purchaseDateStr.split('-').map(Number);
  const purchaseTimestamp = Timestamp.fromDate(new Date(pdY, pdM - 1, pdD, now.getHours(), now.getMinutes(), now.getSeconds(), now.getMilliseconds()));

  let twdAmount, unitCost;
  if (amountMode === 'unit') {
    unitCost = convertToTwd(amount, currency);
    twdAmount = unitCost * quantity;
  } else {
    twdAmount = convertToTwd(amount, currency);
    unitCost = twdAmount / quantity;
  }
  const rateUsed = currency === 'TWD' ? 1 : (exchangeRates[currency] || 1);
  const finalUnit = dupMatchedMaterial ? (dupMatchedMaterial.unit || quantityUnitInput) : quantityUnitInput;

  const btn = document.getElementById('submitPurchaseBtn');
  btn.disabled = true;
  try {
    let materialId = dupMatchedMaterial ? dupMatchedMaterial.id : null;

    if (!materialId) {
      const newDoc = await addDoc(collection(db, 'materials'), {
        category, brand, material, beadType, size, colorSeries, colorCode,
        unit: finalUnit,
        currentStock: 0,
        currentUnitCost: 0,
        archived: false,
        createdAt: purchaseTimestamp,
        updatedAt: serverTimestamp(),
      });
      materialId = newDoc.id;
    }

    await addDoc(collection(db, 'materials', materialId, 'history'), {
      type: 'purchase',
      platform, seller, currency, originalAmount: amount, amountMode, exchangeRateUsed: rateUsed,
      twdAmount,
      packageSpecValue: packageSpecValueRaw ? parseFloat(packageSpecValueRaw) : null,
      packageSpecUnit,
      quantity, quantityUnit: finalUnit, unitCost,
      timestamp: purchaseTimestamp,
    });

    const matRef = doc(db, 'materials', materialId);
    const snap = await getDoc(matRef);
    const cur = snap.data();
    await updateDoc(matRef, {
      currentStock: (cur.currentStock || 0) + quantity,
      currentUnitCost: Math.max(cur.currentUnitCost || 0, unitCost),
      updatedAt: serverTimestamp(),
    });

    closeModal('purchaseModal');
  } catch (e) {
    alert('送出失敗:' + e.message);
  } finally {
    btn.disabled = false;
  }
}

let deleteTargetMaterial = null;
let deleteTargetHistCount = 0;

async function deleteMaterial(m) {
  const histSnap = await getDocs(collection(db, 'materials', m.id, 'history'));
  deleteTargetMaterial = m;
  deleteTargetHistCount = histSnap.size;

  const name = displayName(m);
  const warnEl = document.getElementById('deleteWarningText');
  const confirmRow = document.getElementById('deleteConfirmRow');
  document.getElementById('deleteConfirmInput').value = '';

  if (histSnap.empty) {
    warnEl.textContent = `確定要刪除「${name}」嗎?此操作無法復原。`;
    confirmRow.classList.add('ta-is-hidden');
  } else {
    warnEl.textContent = `「${name}」已經有 ${histSnap.size} 筆歷史紀錄(進貨/調整/修改),刪除後這些紀錄會一併永久消失,無法復原。`;
    confirmRow.classList.remove('ta-is-hidden');
  }
  openModal('deleteModal');
}

document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
  const m = deleteTargetMaterial;
  if (!m) return;

  if (deleteTargetHistCount > 0) {
    const typed = document.getElementById('deleteConfirmInput').value.trim();
    if (typed !== displayName(m)) { alert('輸入的名稱不符，請重新輸入。'); return; }
  }

  const btn = document.getElementById('confirmDeleteBtn');
  btn.disabled = true;
  try {
    const histSnap = await getDocs(collection(db, 'materials', m.id, 'history'));
    for (const d of histSnap.docs) {
      await deleteDoc(doc(db, 'materials', m.id, 'history', d.id));
    }
    await deleteDoc(doc(db, 'materials', m.id));
    closeModal('deleteModal');
    closeModal('detailModal');
  } catch (e) {
    alert('刪除失敗:' + e.message);
  } finally {
    btn.disabled = false;
  }
});

function renderTimeline(logs, unit) {
  const el = document.getElementById('historyTimeline');
  if (!logs.length) { el.innerHTML = '<div class="ta-empty-hint">尚無紀錄</div>'; return; }
  el.innerHTML = logs.map(log => {
    const time = log.timestamp?.toDate ? log.timestamp.toDate().toLocaleString('zh-TW') : '(時間處理中)';
    let typeLabel = '', cls = '', detail = '';
    if (log.type === 'purchase') {
      typeLabel = '進貨'; cls = 'purchase';
      const logUnit = log.quantityUnit || unit;
      const amountLine = log.amountMode === 'unit'
        ? `單價：${log.originalAmount} ${log.currency} / 個（供應商報價，匯率 ${log.exchangeRateUsed}）`
        : `原始金額：${log.originalAmount} ${log.currency}(該次總額,匯率 ${log.exchangeRateUsed})`;
      detail = `${escapeHtml(log.platform || '')} ${log.seller ? ' / ' + escapeHtml(log.seller) : ''}
        ${amountLine}
        →　台幣總額 NT$${(log.twdAmount||0).toFixed(2)}
        ${log.packageSpecValue ? '　包裝規格：' + log.packageSpecValue + escapeHtml(log.packageSpecUnit || '') : ''}<br>
        進貨數量：+${log.quantity} ${escapeHtml(logUnit)}　單價：NT$${(log.unitCost||0).toFixed(4)} / ${escapeHtml(logUnit)}`;
    } else if (log.type === 'adjust') {
      typeLabel = '人工盤點調整'; cls = 'adjust';
      detail = `數量:${log.beforeQty} → ${log.afterQty} ${escapeHtml(unit)}(${log.diff >= 0 ? '+' : ''}${log.diff})
        ${log.reason ? '<br>原因:' + escapeHtml(log.reason) : ''}`;
    } else if (log.type === 'edit') {
      typeLabel = '欄位修改'; cls = 'edit';
      detail = `${escapeHtml(log.field)}:「${escapeHtml(log.oldValue)}」→「${escapeHtml(log.newValue)}」`;
    } else if (log.type === 'archive') {
      typeLabel = log.archived ? '下架' : '上架'; cls = 'edit';
      detail = '';
    }
    return `<div class="ta-timeline-item">
      <div class="ta-timeline-time">${time}</div>
      <div class="ta-timeline-type ta-timeline-type--${cls}">${typeLabel}</div>
      <div class="ta-timeline-detail">${detail}</div>
    </div>`;
  }).join('');
}

async function toggleArchive(m) {
  const newState = !m.archived;
  const ok = await showConfirmModal({
    title: newState ? '下架材料' : '上架材料',
    text: newState
      ? '確定要下架這款材料嗎？下架後不會出現在清單與新增進貨比對中，但歷史紀錄會完整保留。'
      : '確定要重新上架這款材料嗎？上架後會恢復出現在清單與新增進貨比對中。',
  });
  if (!ok) return;
  await updateDoc(doc(db, 'materials', m.id), { archived: newState, updatedAt: serverTimestamp() });
  await addDoc(collection(db, 'materials', m.id, 'history'), {
    type: 'archive', archived: newState, timestamp: serverTimestamp(),
  });
  openDetail(m.id);
}

let editTargetMaterial = null;

function editMaterialFields(m) {
  editTargetMaterial = m;
  document.getElementById('eCategory').value = m.category || '';
  document.getElementById('eBrand').value = m.brand || '';
  document.getElementById('eMaterial').value = m.material || '';
  document.getElementById('eBeadType').value = m.beadType || '';
  document.getElementById('eSize').value = m.size || '';
  document.getElementById('eColorSeries').value = m.colorSeries || '';
  document.getElementById('eColorCode').value = m.colorCode || '';
  openModal('editModal');
}

document.getElementById('submitEditBtn').addEventListener('click', async () => {
  const m = editTargetMaterial;
  if (!m) return;
  const fields = [
    ['category', '分類', 'eCategory'], ['brand', '品牌', 'eBrand'], ['material', '材質', 'eMaterial'],
    ['beadType', '類型/款式', 'eBeadType'], ['size', '尺寸', 'eSize'],
    ['colorSeries', '色系名稱', 'eColorSeries'], ['colorCode', '顏色', 'eColorCode'],
  ];
  const updates = {};
  const logs = [];
  for (const [key, label, inputId] of fields) {
    const oldVal = m[key] || '';
    const newVal = document.getElementById(inputId).value.trim();
    if (newVal !== oldVal) {
      updates[key] = newVal;
      logs.push({ type: 'edit', field: label, oldValue: oldVal, newValue: newVal, timestamp: serverTimestamp() });
    }
  }
  if (Object.keys(updates).length === 0) { closeModal('editModal'); return; }

  const btn = document.getElementById('submitEditBtn');
  btn.disabled = true;
  try {
    updates.updatedAt = serverTimestamp();
    await updateDoc(doc(db, 'materials', m.id), updates);
    for (const log of logs) {
      await addDoc(collection(db, 'materials', m.id, 'history'), log);
    }
    Object.assign(m, updates);
    closeModal('editModal');
    openDetail(m.id);
  } catch (e) {
    alert('儲存失敗:' + e.message);
  } finally {
    btn.disabled = false;
  }
});

  document.getElementById('adjustCurrent').value = (m.currentStock || 0) + ' ' + unit;

  });

document.getElementById('openExchangeBtn').addEventListener('click', () => {
  closeDrawer();
  renderExchangeRateList();
  openModal('exchangeModal');
});

function renderExchangeRateList() {
  const wrap = document.getElementById('exchangeRateList');
  if (!wrap) return;
  const codes = Object.keys(exchangeRates).sort();
  if (!codes.length) {
    wrap.innerHTML = '<div class="ta-empty-hint">尚未新增其他幣別</div>';
    return;
  }
  wrap.innerHTML = '';
  codes.forEach(code => {
    const row = document.createElement('div');
    row.className = 'ta-options-row';
    row.innerHTML = `
      <span class="ta-currency-code">${escapeHtml(code)}</span>
      <input type="number" step="0.01" class="ta-options-row-input" value="${exchangeRates[code]}">
      <button type="button" class="ta-btn ta-btn-sm ta-btn-primary">儲存</button>
    `;
    const input = row.querySelector('.ta-options-row-input');
    const saveBtn = row.querySelector('.ta-btn-primary');
    saveBtn.addEventListener('click', () => saveExchangeRate(code, input.value));
    wrap.appendChild(row);
  });
}

async function saveExchangeRate(code, valueStr) {
  const val = parseFloat(valueStr);
  if (isNaN(val) || val <= 0) { alert('請輸入正確的匯率數字'); return; }
  await setDoc(doc(db, 'settings', 'exchangeRates'), { [code]: val }, { merge: true });
}

document.getElementById('addCurrencyBtn').addEventListener('click', async () => {
  const codeInput = await showInputModal({ title: '新增幣別', label: '輸入幣別代碼(如 USD)' });
  if (!codeInput) return;
  const code = codeInput.trim().toUpperCase();
  if (code === 'TWD') { alert('台幣已經是基準幣別,不需要新增'); return; }
  if (exchangeRates[code] !== undefined) { alert('這個幣別已經存在了'); return; }
  const rateInput = await showInputModal({ title: '設定匯率', label: `1 ${code} = ? 台幣` });
  if (!rateInput) return;
  const rate = parseFloat(rateInput);
  if (isNaN(rate) || rate <= 0) { alert('請輸入正確的匯率數字'); return; }
  await setDoc(doc(db, 'settings', 'exchangeRates'), { [code]: rate }, { merge: true });
});

// ---------- 匯入資料 ----------
let importParsedGroups = null; // 驗證通過後暫存,供確認匯入時使用

document.getElementById('openImportBtn').addEventListener('click', () => {
  closeDrawer();
  resetImportModal();
  openModal('importModal');
});

function resetImportModal() {
  document.getElementById('importFileInput').value = '';
  document.getElementById('importSummary').innerHTML = '';
  document.getElementById('importErrorList').innerHTML = '';
  const progressEl = document.getElementById('importProgress');
  progressEl.classList.add('ta-is-hidden');
  progressEl.textContent = '';
  document.getElementById('confirmImportBtn').classList.add('ta-is-hidden');
  importParsedGroups = null;
}

document.getElementById('importFileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('importSummary').innerHTML = '<div class="ta-import-summary">讀取中...</div>';
  document.getElementById('importErrorList').innerHTML = '';
  document.getElementById('confirmImportBtn').classList.add('ta-is-hidden');
  importParsedGroups = null;

  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
    processImportRows(rows);
  } catch (err) {
    document.getElementById('importSummary').innerHTML = '';
    document.getElementById('importErrorList').innerHTML = `<div class="ta-import-errors">讀取檔案失敗:${escapeHtml(err.message)}</div>`;
  }
});

function parseImportDate(val) {
  if (val instanceof Date && !isNaN(val)) return val;
  if (typeof val === 'number') {
    const d = XLSX.SSF.parse_date_code(val);
    if (d) return new Date(d.y, d.m - 1, d.d, d.H || 0, d.M || 0, d.S || 0);
    return null;
  }
  if (typeof val === 'string' && val.trim()) {
    const m = val.trim().match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  }
  return null;
}

function findMatchingMaterial(category, brand, material, beadType, size, colorSeries, colorCode) {
  return materials.find(m => !m.archived &&
    (m.category || '') === category && (m.brand || '') === brand && (m.material || '') === material &&
    (m.beadType || '') === beadType && (m.size || '') === size && (m.colorSeries || '') === colorSeries &&
    (m.colorCode || '') === colorCode
  );
}

function processImportRows(rows) {
  const summaryEl = document.getElementById('importSummary');
  const errorListEl = document.getElementById('importErrorList');

  if (!rows.length) {
    summaryEl.innerHTML = '';
    errorListEl.innerHTML = '<div class="ta-import-errors">檔案裡沒有讀到任何資料列。</div>';
    return;
  }

  const errors = [];
  const parsedRows = [];

  rows.forEach((row, idx) => {
    const rowNum = idx + 2; // 對應 Excel 實際列號(含標題列)
    const category = String(row['分類'] ?? '').trim();
    const brand = String(row['品牌'] ?? '').trim();
    const material = String(row['材質'] ?? '').trim();
    const beadType = String(row['類型/款式'] ?? '').trim();
    const size = String(row['尺寸'] ?? '').trim();
    const colorSeries = String(row['色系名稱'] ?? '').trim();
    const colorCode = String(row['顏色'] ?? '').trim();
    const platform = String(row['進貨國家/平台'] ?? '').trim();
    const seller = String(row['供應商名稱'] ?? '').trim();
    const currency = String(row['幣別'] ?? '').trim().toUpperCase();
    const amountMode = String(row['金額類型'] ?? '').trim().toLowerCase();
    const amount = row['金額'];
    const packageSpecValueRaw = row['進貨包裝規格數字'];
    const packageSpecUnit = String(row['進貨包裝規格單位'] ?? '').trim();
    const quantity = row['本次進貨數量'];
    const quantityUnit = String(row['數量單位'] ?? '').trim();
    const dateVal = parseImportDate(row['進貨日期']);

    const rowErrors = [];
    if (!dateVal) rowErrors.push('進貨日期格式錯誤或空白(請用 YYYY-MM-DD)');
    const validCurrencies = ['TWD', ...Object.keys(exchangeRates)];
    if (!validCurrencies.includes(currency)) rowErrors.push(`幣別必須是系統已設定的幣別之一(${validCurrencies.join('、')}),如需新幣別請先到「匯率設定」新增`);
    if (!['total','unit'].includes(amountMode)) rowErrors.push('金額類型必須是 total 或 unit');
    if (amount === '' || amount == null || isNaN(Number(amount)) || Number(amount) < 0) rowErrors.push('金額必須是不小於0的數字');
    if (quantity === '' || quantity == null || isNaN(Number(quantity)) || Number(quantity) <= 0) rowErrors.push('本次進貨數量必須是大於0的數字');
    if (!quantityUnit) rowErrors.push('數量單位不能空白');

    if (rowErrors.length) {
      errors.push({ row: rowNum, messages: rowErrors });
      return;
    }

    parsedRows.push({
      rowNum, category, brand, material, beadType, size, colorSeries, colorCode,
      platform, seller, currency, amountMode, amount: Number(amount),
      packageSpecValue: (packageSpecValueRaw !== '' && packageSpecValueRaw != null) ? Number(packageSpecValueRaw) : null,
      packageSpecUnit, quantity: Number(quantity), quantityUnit,
      date: dateVal,
    });
  });

  // 依 7 個身分欄位分組(同一款材料的多筆進貨)
  const groups = new Map();
  for (const r of parsedRows) {
    const key = [r.category, r.brand, r.material, r.beadType, r.size, r.colorSeries, r.colorCode].join('');
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(r);
  }

  // 檢查同一款材料的單位是否一致(含既有材料的單位)
  for (const [key, groupRows] of groups) {
    const [category, brand, material, beadType, size, colorSeries, colorCode] = key.split('');
    const existing = findMatchingMaterial(category, brand, material, beadType, size, colorSeries, colorCode);
    const lockedUnit = existing ? existing.unit : groupRows[0].quantityUnit;
    groupRows.forEach(r => {
      if (r.quantityUnit !== lockedUnit) {
        errors.push({ row: r.rowNum, messages: [`單位「${r.quantityUnit}」跟同一款材料其他列/既有材料的單位「${lockedUnit}」不一致`] });
      }
    });
  }

  if (errors.length) {
    errors.sort((a, b) => a.row - b.row);
    summaryEl.innerHTML = '';
    errorListEl.innerHTML = `<div class="ta-import-errors">
      共 ${rows.length} 列資料,發現 ${errors.length} 列有問題,請修正後重新上傳(本次不會匯入任何資料):
      <ul>${errors.map(e => `<li>第 ${e.row} 列:${e.messages.map(escapeHtml).join(';')}</li>`).join('')}</ul>
    </div>`;
    document.getElementById('confirmImportBtn').classList.add('ta-is-hidden');
    importParsedGroups = null;
    return;
  }

  // 全部通過驗證,計算預覽摘要
  let newMaterialCount = 0, mergeMaterialCount = 0, newRowCount = 0, mergeRowCount = 0;
  const groupInfos = [];
  for (const [key, groupRows] of groups) {
    const [category, brand, material, beadType, size, colorSeries, colorCode] = key.split('');
    const existing = findMatchingMaterial(category, brand, material, beadType, size, colorSeries, colorCode);
    groupRows.sort((a, b) => a.date - b.date);
    if (existing) {
      mergeMaterialCount++;
      mergeRowCount += groupRows.length;
    } else {
      newMaterialCount++;
      newRowCount += groupRows.length;
    }
    groupInfos.push({ category, brand, material, beadType, size, colorSeries, colorCode, rows: groupRows, existingId: existing ? existing.id : null });
  }

  importParsedGroups = groupInfos;

  errorListEl.innerHTML = '';
  summaryEl.innerHTML = `<div class="ta-import-summary">
    共讀取 ${rows.length} 列,全部通過驗證。<br>
    將新增 ${newMaterialCount} 款新材料(共 ${newRowCount} 筆進貨紀錄)。<br>
    將累加到 ${mergeMaterialCount} 款既有材料(共 ${mergeRowCount} 筆進貨紀錄)。
  </div>`;
  document.getElementById('confirmImportBtn').classList.remove('ta-is-hidden');
}

document.getElementById('confirmImportBtn').addEventListener('click', async () => {
  if (!importParsedGroups) return;
  const btn = document.getElementById('confirmImportBtn');
  btn.disabled = true;
  const progressEl = document.getElementById('importProgress');
  progressEl.classList.remove('ta-is-hidden');
  progressEl.textContent = '匯入中,請稍候...';

  try {
    // 先把匯入資料裡出現的新選項值(分類/品牌/材質/類型/單位)補進選項清單
    const optionAdds = { categories: [], brands: [], materials: [], beadTypes: [], stockUnits: [], packageUnits: [] };
    const seen = {};
    for (const key of Object.keys(optionAdds)) seen[key] = new Set(options[key]);
    const checkOption = (val, key) => { if (val && !seen[key].has(val)) { seen[key].add(val); optionAdds[key].push(val); } };
    for (const g of importParsedGroups) {
      checkOption(g.category, 'categories');
      checkOption(g.brand, 'brands');
      checkOption(g.material, 'materials');
      checkOption(g.beadType, 'beadTypes');
      for (const r of g.rows) {
        checkOption(r.quantityUnit, 'stockUnits');
        if (r.packageSpecUnit) checkOption(r.packageSpecUnit, 'packageUnits');
      }
    }
    const optionUpdates = {};
    for (const key of Object.keys(optionAdds)) {
      if (optionAdds[key].length) optionUpdates[key] = [...options[key], ...optionAdds[key]];
    }
    if (Object.keys(optionUpdates).length) {
      await setDoc(doc(db, 'settings', 'options'), optionUpdates, { merge: true });
    }

    // 組裝所有寫入操作
    const ops = []; // { ref, data, opType }
    let totalRows = 0;
    importParsedGroups.forEach(g => totalRows += g.rows.length);

    for (const g of importParsedGroups) {
      let materialId = g.existingId;
      let runningStock, runningCost;

      if (!materialId) {
        const newRef = doc(collection(db, 'materials'));
        materialId = newRef.id;
        const earliestTs = Timestamp.fromDate(g.rows[0].date);
        ops.push({ ref: newRef, opType: 'set', data: {
          category: g.category, brand: g.brand, material: g.material, beadType: g.beadType,
          size: g.size, colorSeries: g.colorSeries, colorCode: g.colorCode,
          unit: g.rows[0].quantityUnit,
          currentStock: 0, currentUnitCost: 0, archived: false,
          createdAt: earliestTs, updatedAt: serverTimestamp(),
        }});
        runningStock = 0;
        runningCost = 0;
      } else {
        const existingMat = materials.find(m => m.id === materialId);
        runningStock = existingMat.currentStock || 0;
        runningCost = existingMat.currentUnitCost || 0;
      }

      for (const r of g.rows) {
        const converted = convertToTwd(r.amount, r.currency);
        let twdAmount, unitCost;
        if (r.amountMode === 'unit') {
          unitCost = converted;
          twdAmount = unitCost * r.quantity;
        } else {
          twdAmount = converted;
          unitCost = twdAmount / r.quantity;
        }
        const rateUsed = r.currency === 'TWD' ? 1 : (exchangeRates[r.currency] || 1);
        const histRef = doc(collection(db, 'materials', materialId, 'history'));
        ops.push({ ref: histRef, opType: 'set', data: {
          type: 'purchase', platform: r.platform, seller: r.seller, currency: r.currency,
          originalAmount: r.amount, amountMode: r.amountMode, exchangeRateUsed: rateUsed,
          twdAmount, packageSpecValue: r.packageSpecValue, packageSpecUnit: r.packageSpecUnit,
          quantity: r.quantity, quantityUnit: r.quantityUnit, unitCost,
          timestamp: Timestamp.fromDate(r.date),
        }});

        runningStock += r.quantity;
        runningCost = Math.max(runningCost, unitCost);
      }

      const matRef = doc(db, 'materials', materialId);
      ops.push({ ref: matRef, opType: 'update', data: {
        currentStock: runningStock, currentUnitCost: runningCost, updatedAt: serverTimestamp(),
      }});
    }

    // 分批寫入(Firestore 單一批次上限 500 個操作)
    const CHUNK_SIZE = 400;
    let committed = 0;
    for (let i = 0; i < ops.length; i += CHUNK_SIZE) {
      const chunk = ops.slice(i, i + CHUNK_SIZE);
      const batch = writeBatch(db);
      chunk.forEach(op => {
        if (op.opType === 'update') batch.update(op.ref, op.data);
        else batch.set(op.ref, op.data);
      });
      await batch.commit();
      committed += chunk.length;
      progressEl.textContent = `匯入中... 已寫入 ${Math.min(committed, ops.length)} / ${ops.length} 筆操作`;
    }

    progressEl.textContent = `匯入完成!共處理 ${totalRows} 筆進貨紀錄。`;
    document.getElementById('confirmImportBtn').classList.add('ta-is-hidden');
    document.getElementById('importSummary').innerHTML = '';
    importParsedGroups = null;
  } catch (err) {
    progressEl.textContent = '';
    document.getElementById('importErrorList').innerHTML = `<div class="ta-import-errors">匯入失敗:${escapeHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
  }
});

// ---------- 匯出資料 ----------
const EXPORT_HISTORY_HEADERS = ['分類','品牌','材質','類型/款式','尺寸','色系名稱','顏色','進貨日期','進貨國家/平台','供應商名稱','幣別','金額類型','金額','進貨包裝規格數字','進貨包裝規格單位','本次進貨數量','數量單位','換算台幣總額','換算單價(台幣)','換算人民幣總額','換算單價(人民幣)'];

function sanitizeSheetName(name) {
  let n = String(name || '未分類').replace(/[\\/?*[\]:]/g, '_');
  if (n.length > 28) n = n.slice(0, 28);
  return n || '未分類';
}

document.getElementById('openExportBtn').addEventListener('click', async () => {
  closeDrawer();
  const btn = document.getElementById('openExportBtn');
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '匯出中...';

  try {
    // 平行讀取所有材料的完整進貨歷史
    const historyResults = await Promise.all(materials.map(m =>
      getDocs(query(collection(db, 'materials', m.id, 'history'), orderBy('timestamp', 'asc')))
        .then(snap => ({ material: m, snap }))
    ));
    const cnyRate = exchangeRates.CNY || 5;
    const historyRows = [];
    for (const { material: m, snap } of historyResults) {
      snap.docs.forEach(d => {
        const log = d.data();
        if (log.type !== 'purchase') return;
        const twdAmount = log.twdAmount || 0;
        const unitCost = log.unitCost || 0;
        historyRows.push([
          m.category || '', m.brand || '', m.material || '', m.beadType || '', m.size || '',
          m.colorSeries || '', m.colorCode || '',
          log.timestamp && log.timestamp.toDate ? log.timestamp.toDate().toISOString().slice(0, 10) : '',
          log.platform || '', log.seller || '', log.currency || '', log.amountMode || '',
          log.originalAmount ?? '', log.packageSpecValue ?? '', log.packageSpecUnit || '',
          log.quantity ?? '', log.quantityUnit || '',
          Number(twdAmount.toFixed(2)), Number(unitCost.toFixed(4)),
          Number((twdAmount / cnyRate).toFixed(2)), Number((unitCost / cnyRate).toFixed(4)),
        ]);
      });
    }

    const wb = XLSX.utils.book_new();

    // 「全部」放所有分類的完整進貨歷史
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([EXPORT_HISTORY_HEADERS, ...historyRows]), '全部');

    // 每個分類一個分頁,內容一樣是進貨歷史格式,只篩選該分類的紀錄
    const usedNames = new Set(['全部']);
    const categoriesInData = [...new Set(materials.map(m => m.category || '未分類'))];
    for (const cat of categoriesInData) {
      const rows = historyRows.filter(r => (r[0] || '未分類') === cat);
      let sheetName = sanitizeSheetName(cat);
      let suffix = 1;
      while (usedNames.has(sheetName)) { suffix++; sheetName = sanitizeSheetName(cat) + '_' + suffix; }
      usedNames.add(sheetName);
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([EXPORT_HISTORY_HEADERS, ...rows]), sheetName);
    }

    const dateStr = new Date().toISOString().slice(0, 10);
    XLSX.writeFile(wb, `材料資料匯出_${dateStr}.xlsx`);
  } catch (err) {
    alert('匯出失敗:' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
});
